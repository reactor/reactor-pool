javadoc {
	dependsOn jar
	group = "documentation"
	description = "Generates Javadoc API documentation."

	afterEvaluate {
		title = "${shortName} ${version}"
		options.header = "$shortName"
	}

	options.addStringOption('Xdoclint:none', '-quiet')
	options.addStringOption('charSet', 'UTF-8')
	options.tags = [ "apiNote:a:API Note:"]
	options.memberLevel = org.gradle.external.javadoc.JavadocMemberLevel.PROTECTED
	options.author = true

	if (project.name == 'reactor-pool') {
		options.links([
				"https://projectreactor.io/docs/core/${libs.versions.reactorCore.get()}/api/",
				jdkJavadoc,
				"https://www.reactive-streams.org/reactive-streams-1.0.4-javadoc/"
		] as String[])
	}
	else {
		options.links([
				"https://projectreactor.io/docs/core/${libs.versions.reactorCore.get()}/api/",
				jdkJavadoc,
				"https://www.reactive-streams.org/reactive-streams-1.0.4-javadoc/",
				"https://javadoc.io/doc/io.micrometer/micrometer-core/${libs.versions.micrometer.get()}/",
				"https://projectreactor.io/docs/pool/${libs.versions.baseline.pool.api.get()}/api/"
		] as String[])
	}

	maxMemory = "1024m"
	destinationDir = layout.buildDirectory.dir("docs/javadoc").get().asFile
	source project.sourceSets.main.allJava
	def mainCompileClasspath = project.sourceSets.main.compileClasspath
	doFirst {
		classpath = files(mainCompileClasspath)
	}
}

